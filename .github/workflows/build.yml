name: Build Dobby iOS XCFramework

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        run: brew install cmake

      # -------------------------
      # Patch Dobby environment check (IMPORTANT)
      # -------------------------
      - name: Patch Dobby CMake (bypass env check)
        run: |
          sed -i '' 's/message(FATAL_ERROR "Processor not configured")/# disabled/g' Dobby/cmake/build_environment_check.cmake

      # -------------------------
      # Build iOS Device (arm64)
      # -------------------------
      - name: Configure iOS Device
        run: |
          mkdir build_ios_device
          cd build_ios_device

          cmake ../Dobby \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build iOS Device
        run: |
          cd build_ios_device
          xcodebuild \
            -project Dobby.xcodeproj \
            -configuration Release \
            -sdk iphoneos \
            -target dobby \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # -------------------------
      # Build iOS Simulator (arm64 + x86_64)
      # -------------------------
      - name: Configure iOS Simulator
        run: |
          mkdir build_ios_sim
          cd build_ios_sim

          cmake ../Dobby \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build iOS Simulator
        run: |
          cd build_ios_sim
          xcodebuild \
            -project Dobby.xcodeproj \
            -configuration Release \
            -sdk iphonesimulator \
            -target dobby \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # -------------------------
      # Create XCFramework
      # -------------------------
      - name: Create XCFramework
        run: |
          mkdir -p output

          xcodebuild -create-xcframework \
            -library build_ios_device/build/Release-iphoneos/libdobby.a \
            -headers Dobby \
            -library build_ios_sim/build/Release-iphonesimulator/libdobby.a \
            -headers Dobby \
            -output output/Dobby.xcframework

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Dobby-xcframework
          path: output/